<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Upload de Mídia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white; /* Texto claro para contrastar com o fundo */
        }

        /* Camada de fundo fixa e desfocada */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./public/img/IMG_7362.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(8px) brightness(0.7); /* Reduz nitidez e brilho */
            z-index: -1;
            transform: scale(1.05); /* Remove bordas brancas do blur */
        }

        h1 {
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .upload-box {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px); /* Efeito de vidro no botão */
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        .gallery img,
        .gallery video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid white;
        }

        /* Container do Spinner */
        #loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px auto;
        }

        /* O círculo giratório */
        #loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status-text {
            margin-top: 10px;
            font-size: 14px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <h1>📸 Adicione sua mídia digital 💕</h1>

    <div class="upload-box">
        <input 
            type="file" 
            accept="image/*,video/*" 
            multiple 
            capture="environment"
            onchange="previewMedia(event)"
        >
    </div>

    <div id="loader-container">
        <div class="spinner"></div>
        <p id="status-text">Processando...</p>
    </div>

    <div class="gallery" id="gallery"></div>

    <script>
        const APP_SCRIPT_URL = 'https://script.google.com/macros/library/d/1dkaYKaUAl_g-jmZhVlnKWo6eiXvX0sZUytN5gHfD5X7f77zjyXTlRSOt/3';
        
        const MAX_FILE_SIZE_MB = 50;

        // 1. Carregar fotos existentes ao abrir
        window.onload = async () => {
            const gallery = document.getElementById('gallery');
            try {
                const res = await fetch(API_URL);
                const fotos = await res.json();
                if(fotos.length > 0) {
                    gallery.innerHTML = '<p class="label-social">✨ O que já rolou por aqui:</p>';
                    fotos.forEach(f => renderMedia(f.url, 'image', true));
                }
            } catch(e) { console.log("Iniciando galeria vazia."); }
        };

        async function previewMedia(event) {
            const files = event.target.files;
            const loaderContainer = document.getElementById('loader-container');
            const statusText = document.getElementById('status-text');
            const gallery = document.getElementById('gallery');
            
            if (files.length > 0) loaderContainer.style.display = 'flex';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const fileSizeMB = file.size / (1024 * 1024);

                // Validação de Tamanho
                if (fileSizeMB > MAX_FILE_SIZE_MB) {
                    alert(`O arquivo "${file.name}" é muito grande (${fileSizeMB.toFixed(1)}MB). O limite é de ${MAX_FILE_SIZE_MB}MB.`);
                    continue; // Pula este arquivo e vai para o próximo
                }

                statusText.innerText = `Enviando ${i + 1} de ${files.length}: ${file.name}`;
                
                // Gera a prévia visual
                const url = URL.createObjectURL(file);
                renderizarNaGaleria(file, url);

                try {
                    await enviarParaGoogleDrive(file);
                } catch (error) {
                    console.error("Erro no arquivo:", file.name);
                }
            }
            
            statusText.innerText = "✅ Finalizado!";
            setTimeout(() => { loaderContainer.style.display = 'none'; }, 3000);
        }

        // 2. Processar Novos Uploads
        async function handleUpload(event) {
            const files = event.target.files;
            const name = document.getElementById('guest-name').value || "Convidado";
            const loader = document.getElementById('loader-container');
            const status = document.getElementById('status-text');

            loader.style.display = 'flex';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.size > 50 * 1024 * 1024) {
                    alert(`Arquivo ${file.name} excede 50MB!`);
                    continue;
                }

                status.innerText = `Enviando ${i+1}/${files.length}...`;
                
                // Preview imediato
                const localUrl = URL.createObjectURL(file);
                renderMedia(localUrl, file.type.split('/')[0], false);

                await uploadFile(file, name);
            }
            
            status.innerText = "✅ Enviado com sucesso!";
            setTimeout(() => { loader.style.display = 'none'; }, 3000);
        }

        function uploadFile(file, guest) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            base64: reader.result.split(',')[1],
                            type: file.type,
                            name: `${guest}_${Date.now()}_${file.name}`,
                            guest: guest
                        })
                    }).then(resolve).catch(resolve);
                };
            });
        }

        function renderMedia(url, type, isOld) {
            const el = document.createElement(type === 'video' ? 'video' : 'img');
            el.src = url;
            if(type === 'video') el.controls = true;
            if(isOld) el.style.opacity = "0.6";
            document.getElementById('gallery').prepend(el);
        }
    </script>

</body>
</html>
